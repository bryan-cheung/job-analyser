<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pricing Performance</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --surface: #ffffff;
      --surface-soft: #f2f6ff;
      --line: #dfe7f2;
      --line-strong: #c8d5e8;
      --text: #111827;
      --muted: #64748b;
      --blue: #2878f0;
      --teal: #16b8ad;
      --violet: #8d63e9;
      --orange: #ff842b;
      --amber: #f7bd31;
      --sky: #82aeee;
      --green: #10a86b;
      --red: #e05252;
      --shadow: 0 10px 28px rgba(16, 24, 40, 0.06);
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--text);
    }

    button, input, select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr) 410px;
      grid-template-rows: 64px 1fr;
    }

    .app.compare-mode,
    .app.requests-mode,
    .app.predefined-mode,
    .app.micro-mode {
      grid-template-columns: 260px minmax(0, 1fr);
    }

    .app.compare-mode .drawer,
    .app.requests-mode .drawer,
    .app.predefined-mode .drawer,
    .app.micro-mode .drawer {
      display: none;
    }

    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 18px;
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(14px);
    }

    .brand {
      width: 260px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 0 0 auto;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #ffffff;
      background: var(--blue);
      box-shadow: 0 8px 18px rgba(40, 120, 240, 0.24);
    }

    .brand-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .top-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .action-button, .date-button, .icon-button {
      height: 38px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: #26364d;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .action-button:hover, .date-button:hover, .icon-button:hover {
      border-color: var(--line-strong);
      background: #f9fbff;
    }

    .date-button {
      min-width: 210px;
      padding: 0 12px;
    }

    .action-button {
      padding: 0 14px;
    }

    .icon-button {
      width: 38px;
      padding: 0;
    }

    .sidebar {
      grid-row: 2;
      border-right: 1px solid var(--line);
      background: var(--surface);
      padding: 22px 14px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .nav-section {
      display: grid;
      gap: 8px;
    }

    .nav-title {
      padding: 0 12px;
      color: #64748b;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .nav-item {
      border: 0;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px;
      border-radius: 7px;
      color: #22314a;
      font-weight: 600;
      text-align: left;
    }

    .nav-item.active {
      background: #edf4ff;
      color: var(--blue);
    }

    .sidebar-footer {
      margin-top: auto;
      display: grid;
      gap: 8px;
    }

    .main {
      grid-row: 2;
      padding: 30px 24px 32px;
      overflow: hidden;
    }

    .app.compare-mode .main,
    .app.requests-mode .main,
    .app.predefined-mode .main,
    .app.micro-mode .main {
      grid-column: 2;
    }

    .page-head {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: end;
      margin: 0 0 26px;
    }

    h1 {
      font-size: 29px;
      line-height: 1.15;
      margin: 0 0 8px;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: #55647a;
      font-size: 15px;
    }

    .health-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 34px;
      padding: 0 12px;
      border: 1px solid #bcebd7;
      color: #087a4d;
      background: #effdf6;
      border-radius: 999px;
      font-weight: 700;
      white-space: nowrap;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(5, minmax(140px, 1fr));
      gap: 18px;
      margin-bottom: 20px;
    }

    .metric-card, .panel, .details-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .metric-card {
      min-height: 162px;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric-icon {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      margin-bottom: 18px;
    }

    .metric-label {
      color: #64748b;
      font-size: 12px;
      font-weight: 700;
    }

    .metric-value {
      margin-top: 8px;
      font-size: 25px;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .trend {
      display: flex;
      gap: 6px;
      color: var(--green);
      font-size: 12px;
      font-weight: 700;
      margin-top: 14px;
    }

    .trend span:last-child {
      color: #7b8a9e;
      font-weight: 600;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: 1.08fr 1fr;
      gap: 18px;
      margin-bottom: 20px;
    }

    .panel {
      padding: 18px;
      min-height: 356px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .panel-title {
      font-size: 15px;
      font-weight: 800;
      margin: 0;
    }

    .info {
      color: #7890ad;
      display: inline-flex;
    }

    .stack-chart {
      height: 222px;
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 10px;
    }

    .axis {
      display: grid;
      grid-template-rows: repeat(5, 1fr);
      color: #738299;
      font-size: 12px;
      text-align: right;
      padding-top: 2px;
    }

    .plot {
      position: relative;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      align-items: end;
      gap: 22px;
      padding: 0 8px 24px;
      border-bottom: 1px solid var(--line);
    }

    .plot::before {
      content: "";
      position: absolute;
      inset: 0 0 24px 0;
      background: repeating-linear-gradient(to bottom, transparent 0, transparent 48px, var(--line) 49px);
      pointer-events: none;
    }

    .bar-wrap {
      height: 178px;
      display: flex;
      align-items: end;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .bar {
      width: min(32px, 80%);
      display: flex;
      flex-direction: column-reverse;
      border-radius: 3px 3px 0 0;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .seg {
      min-height: 4px;
    }

    .x-label {
      position: absolute;
      bottom: 0;
      width: 40px;
      font-size: 12px;
      line-height: 1.1;
      text-align: center;
      color: #66758c;
    }

    .legend {
      display: flex;
      gap: 18px 28px;
      flex-wrap: wrap;
      margin-top: 14px;
      color: #334155;
      font-size: 12px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      background: var(--color);
      flex: 0 0 auto;
    }

    .distribution {
      display: grid;
      grid-template-columns: 230px 1fr;
      align-items: center;
      gap: 24px;
      padding-top: 8px;
    }

    .donut {
      width: 216px;
      height: 216px;
      border-radius: 50%;
      background: conic-gradient(
        var(--blue) 0 18.7%,
        var(--teal) 18.7% 32.9%,
        var(--violet) 32.9% 67.7%,
        var(--orange) 67.7% 77.8%,
        var(--amber) 77.8% 90.4%,
        var(--sky) 90.4% 100%
      );
      position: relative;
      display: grid;
      place-items: center;
    }

    .donut::before {
      content: "";
      position: absolute;
      width: 126px;
      height: 126px;
      border-radius: 50%;
      background: var(--surface);
    }

    .donut-label {
      position: relative;
      text-align: center;
      display: grid;
      gap: 6px;
    }

    .donut-label span {
      color: #334155;
      font-size: 13px;
      font-weight: 700;
    }

    .donut-label strong {
      font-size: 23px;
      letter-spacing: 0;
    }

    .dist-list {
      display: grid;
      gap: 18px;
    }

    .dist-row {
      display: grid;
      grid-template-columns: 12px 1fr 58px;
      align-items: center;
      gap: 10px;
      color: #31425b;
      font-size: 12px;
    }

    .table-panel {
      padding: 0;
      overflow: hidden;
    }

    .table-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--line);
    }

    .table-tools {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search {
      position: relative;
      min-width: 430px;
    }

    .search svg {
      position: absolute;
      top: 50%;
      left: 12px;
      transform: translateY(-50%);
      color: #74859d;
    }

    .search input {
      width: 100%;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 12px 0 38px;
      outline: none;
      color: #1e293b;
      background: #fbfdff;
    }

    .search input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(40, 120, 240, 0.12);
    }

    .columns-button {
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #41516a;
      font-weight: 700;
    }

    .jobs-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 12px;
    }

    .jobs-table th {
      height: 41px;
      color: #334155;
      background: #fbfcfe;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-weight: 800;
      padding: 0 12px;
      white-space: nowrap;
    }

    .jobs-table td {
      height: 54px;
      border-bottom: 1px solid var(--line);
      padding: 0 12px;
      color: #1f2d44;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .jobs-table tr {
      transition: background 140ms ease;
    }

    .jobs-table tr:hover {
      background: #f7fbff;
    }

    .jobs-table tr.selected {
      background: #eaf3ff;
      box-shadow: inset 0 0 0 1px #a8cfff;
    }

    .job-link {
      color: #006cf0;
      font-weight: 700;
      background: none;
      border: 0;
      padding: 0;
    }

    .status {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 9px;
      border-radius: 6px;
      font-weight: 700;
    }

    .status.success {
      color: #087a4d;
      background: #e9fbf2;
      border: 1px solid #bcebd7;
    }

    .status.failed {
      color: #b42318;
      background: #fff0f0;
      border: 1px solid #ffc9c9;
    }

    .row-arrow {
      color: #46607f;
      text-align: right;
    }

    .pagination {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 18px;
      padding: 0 18px;
      color: #40516b;
      font-size: 12px;
    }

    .page-button, .page-size {
      height: 34px;
      min-width: 34px;
      border-radius: 6px;
      border: 1px solid transparent;
      background: transparent;
      color: #40516b;
    }

    .page-button.active {
      color: var(--blue);
      background: #eaf3ff;
      border-color: #cfe3ff;
      font-weight: 800;
    }

    .page-size {
      min-width: 74px;
      border-color: var(--line);
      background: #ffffff;
    }

    .drawer {
      grid-row: 2;
      background: rgba(255, 255, 255, 0.96);
      border-left: 1px solid var(--line);
      padding: 0 14px 24px;
      overflow: auto;
      box-shadow: -8px 0 24px rgba(16, 24, 40, 0.04);
    }

    .drawer-head {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(14px);
    }

    .drawer-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 800;
    }

    .drawer-body {
      display: grid;
      gap: 12px;
    }

    .job-overview {
      padding: 18px 8px 2px;
    }

    .job-id-line {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      font-size: 14px;
      font-weight: 800;
    }

    .copy-button {
      border: 0;
      background: transparent;
      color: #74859d;
      width: 28px;
      height: 28px;
      display: inline-grid;
      place-items: center;
      border-radius: 6px;
    }

    .copy-button:hover {
      background: #f1f5fb;
    }

    .overview-grid {
      display: grid;
      grid-template-columns: 95px 1fr;
      row-gap: 14px;
      color: #35465f;
      font-size: 13px;
    }

    .overview-grid dt {
      color: #66758c;
      margin: 0;
    }

    .overview-grid dd {
      margin: 0;
      font-weight: 700;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--line);
      margin: 8px -2px 0;
    }

    .tab {
      height: 44px;
      border: 0;
      background: transparent;
      color: #4b5b74;
      font-weight: 800;
      position: relative;
    }

    .tab.active {
      color: var(--blue);
    }

    .tab.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 3px;
      background: var(--blue);
      border-radius: 3px 3px 0 0;
    }

    .details-card {
      padding: 16px;
      box-shadow: none;
    }

    .details-card h3 {
      margin: 0 0 14px;
      font-size: 15px;
    }

    .breakdown {
      display: grid;
      gap: 13px;
    }

    .break-row {
      display: grid;
      grid-template-columns: 13px minmax(92px, 1fr) 70px 44px 66px;
      align-items: center;
      gap: 8px;
      color: #42536d;
      font-size: 12px;
    }

    .mini-track {
      height: 7px;
      border-radius: 999px;
      background: #eef2f7;
      overflow: hidden;
    }

    .mini-fill {
      height: 100%;
      width: var(--w);
      background: var(--color);
      border-radius: inherit;
    }

    .break-total {
      border-top: 1px solid var(--line);
      padding-top: 13px;
      font-weight: 800;
    }

    .request-tools {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    .request-select {
      min-width: 0;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 11px;
      color: #334155;
      background: #fbfdff;
    }

    .request-nav {
      display: inline-flex;
      gap: 6px;
    }

    .request-total {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      color: #64748b;
      margin-bottom: 14px;
    }

    .request-total strong {
      color: #111827;
    }

    .subtle-head {
      display: grid;
      grid-template-columns: 1fr 70px 42px 66px;
      gap: 8px;
      padding: 8px 0;
      color: #64748b;
      font-size: 12px;
      font-weight: 800;
    }

    .full-details {
      height: 52px;
      border: 1px solid var(--line);
      background: #ffffff;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #26364d;
      font-weight: 800;
    }

    .request-list {
      display: none;
      gap: 10px;
    }

    .request-list.active {
      display: grid;
    }

    .request-item {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 5px 10px;
      color: #42536d;
      font-size: 12px;
      background: #fbfdff;
    }

    .request-item strong {
      color: #111827;
      font-size: 13px;
    }

    .request-stats {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 11px;
    }

    .request-stats th,
    .request-stats td {
      height: 36px;
      padding: 0 6px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      color: #34445c;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .request-stats th:first-child,
    .request-stats td:first-child {
      width: 31%;
    }

    .request-stats th {
      color: #64748b;
      font-weight: 800;
      background: #fbfcfe;
    }

    .request-stats td:first-child {
      font-weight: 800;
    }

    .request-stats tr:last-child td {
      border-bottom: 0;
      font-weight: 700;
    }

    .request-stats tr:last-child td:first-child {
      font-weight: 800;
    }

    .stats-footnote {
      margin: 10px 0 0;
      color: #64748b;
      font-size: 12px;
      line-height: 1.4;
    }

    .empty {
      display: none;
      padding: 38px 18px;
      text-align: center;
      color: #64748b;
      border-top: 1px solid var(--line);
    }

    .hidden {
      display: none !important;
    }

    .compare-page {
      display: grid;
      gap: 16px;
    }

    .compare-controls {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) 58px minmax(280px, 1fr) 116px;
      gap: 14px;
      align-items: center;
    }

    .job-picker {
      min-height: 62px;
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 12px;
      align-items: center;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 7px;
    }

    .job-picker strong {
      font-size: 13px;
    }

    .picker-field {
      height: 40px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfdff;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 0 10px 0 14px;
    }

    .picker-field select {
      min-width: 0;
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: #1f2d44;
      font-weight: 700;
      appearance: none;
    }

    .compare-button {
      height: 44px;
      border: 0;
      border-radius: 6px;
      color: #ffffff;
      background: var(--blue);
      font-weight: 800;
      box-shadow: 0 12px 22px rgba(40, 120, 240, 0.18);
    }

    .compare-summary {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }

    .compare-card {
      min-height: 156px;
      padding: 18px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--accent);
    }

    .compare-card.diff {
      border-left-color: transparent;
    }

    .compare-label {
      margin: 0 0 14px;
      color: var(--accent);
      font-size: 15px;
      font-weight: 800;
    }

    .compare-job-title {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      font-size: 18px;
      font-weight: 800;
    }

    .compare-meta {
      color: #60708a;
      font-size: 13px;
      margin-bottom: 18px;
    }

    .compare-kpis {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }

    .compare-kpi {
      padding: 0 18px;

</head>

    function makeJob(id, status, createdAt, requests, values) {
      const timing = {
        tradeQuery: values[0],
        vmCreate: values[1],
        pricing: values[2],
        vmReclaim: values[3],
        resultIngest: values[4],
        postProcess: values[5]
      };
      const job = {
        id,
        status,
        createdAt,
        requests,
        timing,
        requestRuns: Array.from({ length: requests }, (_, index) => makeRequest(id, index, values[2], status))
      };
      job.requestStats = requestAggregateRows(job);
      job.topRequests = job.requestRuns
        .map((request, index) => ({ request, index, total: requestTotal(request) }))
        .sort((left, right) => right.total - left.total)
        .slice(0, 5);
      return job;
    }

    function makeRequest(jobId, index, pricingSeconds, status) {
      const wave = Math.sin(index * 0.017) * 0.42 + Math.cos(index * 0.031) * 0.26;
      const tail = index % 97 === 0 ? 2.85 : index % 37 === 0 ? 1.72 : 1;
      const base = Math.max(5.8, (pricingSeconds / 13 + ((index % 5) - 2) * 0.38 + wave) * tail);
      const calculate = base * (status === "Failed" && index % 7 === 0 ? 0.82 : 0.68 + (index % 4) * 0.012);
      const dataPrepare = base * (0.13 + (index % 5) * 0.011);
      const cleanup = Math.max(0.8, base - calculate - dataPrepare);
      return {
        id: `${jobId.replace("job", "req")}_${String(index + 1).padStart(2, "0")}`,
        index,
        tradeId: `trd_${String((index * 7919 + jobId.length * 37) % 999999).padStart(6, "0")}`,
        host: `price-vm-${String(index % 48 + 1).padStart(2, "0")}`,
        resultIngest: Math.max(0.35, base * (0.055 + (index % 6) * 0.006)),
        serviceCpu: Math.min(99, 36 + (index % 29) * 1.7 + (tail > 1 ? 18 : 0)),
        memoryMb: 760 + (index % 22) * 32 + (tail > 1 ? 180 : 0),
        status: status === "Failed" && index % 41 === 0 ? "Failed" : "Success",
        startedAt: requestStartedAt(index),
        steps: { dataPrepare, calculate, cleanup }
      };
    }

    function requestStartedAt(index) {
      const base = new Date("2024-05-18T09:42:00");
      base.setSeconds(base.getSeconds() + index * 2);
      return base.toLocaleString("en-US", {
        month: "short",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function makePredefinedJob(id, name, environment, schedule, trigger, durationMinutes, state, scope, testCases, averageDuration, nextTrigger) {
      return {
        id,
        name,
        environment,
        schedule,
        trigger,
        durationMinutes,
        state,
        scope,
        testCases,
        averageDuration,
        nextTrigger,
        lastRun: state === "Upcoming" ? "May 20, 2024" : "May 21, 2024",
        owner: environment === "Prod" ? "Release Management" : `${environment} Automation`
      };
    }

    function totalSeconds(job) {
      return stages.reduce((sum, stage) => sum + job.timing[stage.key], 0);
    }

    function requestTotal(request) {
      return requestSteps.reduce((sum, step) => sum + requestStepValue(request, step.key), 0);
    }

    function requestStepValue(request, key) {
      return key === "resultIngest" ? request.resultIngest : request.steps[key];
    }

    function vmLifecycleSeconds(job) {
      return job.timing.vmCreate + job.timing.vmReclaim;
    }

    function formatInteger(value) {
      return new Intl.NumberFormat("en-US").format(value);
    }

    function percentile(sortedValues, percentileValue) {
      if (!sortedValues.length) return 0;
      const index = Math.ceil((percentileValue / 100) * sortedValues.length) - 1;
      return sortedValues[Math.max(0, Math.min(sortedValues.length - 1, index))];
    }

    function requestAggregateRows(job) {
      const rows = requestSteps.map(step => {
        const values = job.requestRuns.map(request => requestStepValue(request, step.key)).sort((a, b) => a - b);
        const sum = values.reduce((total, value) => total + value, 0);
        return {
          label: step.statLabel || step.label,
          color: step.color,
          mean: sum / values.length,
          p95: percentile(values, 95),
          p98: percentile(values, 98),
          sum
        };
      });
      const totals = job.requestRuns.map(requestTotal).sort((a, b) => a - b);
      const totalSum = totals.reduce((sum, value) => sum + value, 0);
      rows.push({
        label: "Total",
        color: "#111827",
        mean: totalSum / totals.length,
        p95: percentile(totals, 95),
        p98: percentile(totals, 98),
        sum: totalSum
      });
      return rows;
    }

    function formatDuration(seconds, includeMillis = false) {
      const minutes = Math.floor(seconds / 60);
      const remaining = seconds - minutes * 60;
      if (includeMillis) {
        return `${String(minutes).padStart(2, "0")}:${remaining.toFixed(3).padStart(6, "0")}`;
      }
      return `${String(minutes).padStart(2, "0")}:${remaining.toFixed(2).padStart(5, "0")}`;
    }

    function formatMetric(seconds) {
      const minutes = Math.floor(seconds / 60);
      const remaining = seconds - minutes * 60;
      return `${String(minutes).padStart(2, "0")}:${remaining.toFixed(2).padStart(5, "0")}`;
    }

    function formatLongDuration(seconds) {
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      const remaining = seconds % 60;
      if (hours > 0) return `${hours}h${String(minutes).padStart(2, "0")}m`;
      if (minutes > 0) return `${minutes}m${remaining.toFixed(1)}s`;
      return `${remaining.toFixed(3)}s`;
    }

    function formatStatDuration(seconds) {
      if (seconds < 60) return `${seconds.toFixed(3)}s`;
      return formatLongDuration(seconds);
    }

    function timeToMinutes(value) {
      const [hours, minutes] = value.split(":").map(Number);
      return hours * 60 + minutes;
    }

    function minutesToClock(value) {
      const minutes = Math.max(0, Math.min(1440, value));
      const hours = Math.floor(minutes / 60);
      const mins = minutes % 60;
      return `${String(hours).padStart(2, "0")}:${String(mins).padStart(2, "0")}`;
    }

    function formatHour(value) {
      return value === 1440 ? "24:00" : minutesToClock(value);
    }

    function formatJobDuration(minutes) {
      const hours = Math.floor(minutes / 60);
      const remaining = minutes % 60;
      if (hours && remaining) return `${hours}h ${remaining}m`;
      if (hours) return `${hours}h`;
      return `${remaining}m`;
    }

    function statusClass(state) {
      return state === "Failed" ? "failed" : "success";
    }

    function nextReleaseWindow(job) {
      const trigger = timeToMinutes(job.trigger);
      const windows = releaseWindows.filter(window => window.env === job.environment);
      return windows.find(window => timeToMinutes(window.start) >= trigger) || windows[0];
    }

    function formatSignedDuration(seconds) {
      const sign = seconds >= 0 ? "+" : "-";
      return `${sign}${formatDuration(Math.abs(seconds))}`;
    }

    function formatSignedPercent(value) {
      const sign = value >= 0 ? "+" : "-";
      return `${sign}${Math.abs(value).toFixed(1)}%`;

    function deltaClass(value) {

        calendar: '<svg viewBox="0 0 24 24"><path d="M8 2v4"/><path d="M16 2v4"/><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 11h18"/></svg>',

        window: '<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/><path d="M8 4v16"/></svg>'
      };
      return icons[name];
    }

      document.getElementById("jobCount").textContent = showFailuresOnly ? visibleJobs.length : "1,248";
      document.getElementById("rangeLabel").textContent = visibleJobs.length ? `1-${visibleJobs.length} of ${showFailuresOnly ? visibleJobs.length : "1,248"}` : "0 of 0";

    function renderTabs() {
      document.getElementById("overviewTab").classList.toggle("active", activeTab === "overview");
      document.getElementById("requestsTab").classList.toggle("active", activeTab === "requests");
      document.getElementById("overviewPane").classList.toggle("hidden", activeTab !== "overview");
      const pane = document.getElementById("requestsPane");
      pane.classList.toggle("active", activeTab === "requests");
      pane.innerHTML = selectedJob.requestRuns.slice(0, 8).map((request, index) => {
        const total = requestTotal(request);
        return `
          <button class="request-item" type="button" data-request-card="${index}">
            <strong>${request.id}</strong>
            <span>${formatDuration(total, true)}</span>

            <span>${index === selectedRequestIndex ? "Selected" : "Open"}</span>
          </button>

        card.addEventListener("click", () => {

          document.getElementById("requestSelect").value = String(selectedRequestIndex);
          renderSelectedRequest();
          renderTabs();

    async function loadMicroHtml(path) {
      const response = await fetch(path, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Unable to load ${path}: ${response.status}`);
      }
      return response.text();
    }

    async function switchView(view) {
      const config = microPages[view] || microPages.overview;
      currentView = view;
      document.querySelectorAll("[data-view]").forEach(item => {
        item.classList.toggle("active", item.dataset.view === view);
      });

      const appRoot = document.getElementById("appRoot");
      ["compare-mode", "requests-mode", "predefined-mode", "micro-mode"].forEach(className => {
        appRoot.classList.toggle(className, config.modeClass === className);
      });

      try {
        const [pageHtml, drawerHtml] = await Promise.all([
          loadMicroHtml(config.page),
          config.drawer ? loadMicroHtml(config.drawer) : Promise.resolve("")
        ]);
        document.getElementById("microPageHost").innerHTML = pageHtml;
        document.getElementById("drawerHost").innerHTML = drawerHtml;
        config.render();
        config.wire();
      } catch (error) {
        document.getElementById("microPageHost").innerHTML = `
          <section class="panel">
            <div class="panel-head"><h2 class="panel-title">Unable to load page</h2></div>
            <p class="subtitle">Start a local server from this folder and open the app over http:// to load micro HTML pages.</p>
            <p class="stats-footnote">${error.message}</p>
          </section>
        `;
        document.getElementById("drawerHost").innerHTML = "";
        console.error(error);
      }
    }

    function renderRequestGridControls() {
      const options = jobs.map(job => `<option value="${job.id}">${job.id}</option>`).join("");
      const select = document.getElementById("requestJobSelect");
      const compareSelect = document.getElementById("requestCompareJobSelect");
      select.innerHTML = options;
      select.value = requestGridJob.id;
      compareSelect.innerHTML = `<option value="">Single job</option>${options}`;
      compareSelect.value = requestGridCompareJob?.id || "";
    }

    function requestGridRows() {
      const query = document.getElementById("requestGridSearch").value.trim().toLowerCase();
      const compareByTrade = requestGridCompareJob
        ? new Map(requestGridCompareJob.requestRuns.map(request => [request.tradeId, request]))
        : null;
      const rows = requestGridJob.requestRuns.flatMap(requestA => {
        const requestB = compareByTrade?.get(requestA.tradeId) || null;
        if (compareByTrade && !requestB) return [];
        return [{ tradeId: requestA.tradeId, requestA, requestB }];
      });
      if (!query) return rows;
      return rows.filter(row => {
        return [
          row.tradeId,
          row.requestA.id,
          row.requestA.host,
          row.requestA.status,
          row.requestB?.id || "",
          row.requestB?.host || "",
          row.requestB?.status || ""
        ].join(" ").toLowerCase().includes(query);
      });
    }

    function twoJobRequestRow(row) {
      const requestA = row.requestA;
      const requestB = row.requestB;
      const totalA = requestTotal(requestA);
      const totalB = requestB ? requestTotal(requestB) : 0;
      const totalDiff = requestB ? totalA - totalB : 0;
      const cpuDiff = requestB ? requestA.serviceCpu - requestB.serviceCpu : 0;
      return `
        <tr>
          <td class="mono">${row.tradeId}</td>
          <td class="mono">${requestA.id}</td>
          <td><span class="host-chip">${requestA.host}</span></td>
          <td>${formatStatDuration(requestA.steps.dataPrepare)}</td>
          <td>${formatStatDuration(requestA.steps.calculate)}</td>
          <td><span class="cpu-pill">${requestA.serviceCpu.toFixed(1)}%</span></td>
          <td>${formatStatDuration(totalA)}</td>
          <td class="mono">${requestB?.id || "Missing"}</td>
          <td>${requestB ? `<span class="host-chip">${requestB.host}</span>` : "-"}</td>
          <td>${requestB ? formatStatDuration(requestB.steps.dataPrepare) : "-"}</td>
          <td>${requestB ? formatStatDuration(requestB.steps.calculate) : "-"}</td>
          <td>${requestB ? `<span class="cpu-pill">${requestB.serviceCpu.toFixed(1)}%</span>` : "-"}</td>
          <td>${requestB ? formatStatDuration(totalB) : "-"}</td>
          <td class="${requestB ? deltaClass(totalDiff) : ""}">${requestB ? formatSignedDuration(totalDiff) : "-"}</td>
          <td class="${requestB ? deltaClass(cpuDiff) : ""}">${requestB ? `${cpuDiff >= 0 ? "+" : ""}${cpuDiff.toFixed(1)}%` : "-"}</td>
        </tr>
      `;
    }

    function renderRequestGrid() {
      renderRequestGridControls();
      const rows = requestGridRows();
      const maxPage = Math.max(1, Math.ceil(rows.length / requestGridPageSize));
      requestGridPage = Math.min(requestGridPage, maxPage);
      const start = (requestGridPage - 1) * requestGridPageSize;
      const pageRows = rows.slice(start, start + requestGridPageSize);
      const isCompare = Boolean(requestGridCompareJob);
      document.getElementById("requestGridCount").textContent = isCompare
        ? `${formatInteger(rows.length)} matched trades`
        : `${formatInteger(requestGridJob.requests)} requests`;
      document.getElementById("requestGridRange").textContent = rows.length
        ? `${formatInteger(start + 1)}-${formatInteger(start + pageRows.length)} of ${formatInteger(rows.length)}`
        : "0 of 0";
      document.getElementById("requestGridEmpty").style.display = pageRows.length ? "none" : "block";
      document.getElementById("requestPrevPage").disabled = requestGridPage === 1;
      document.getElementById("requestNextPage").disabled = requestGridPage === maxPage;
      const table = document.querySelector(".request-data-table");
      table.classList.toggle("two-job", isCompare);
      document.getElementById("requestGridHead").innerHTML = isCompare ? renderTwoJobRequestGridHead() : renderSingleRequestGridHead();
      document.getElementById("requestGridBody").innerHTML = isCompare
        ? pageRows.map(twoJobRequestRow).join("")
        : pageRows.map(row => singleRequestRow(row.requestA)).join("");
    }

    function renderComparePickers() {

    function compareCard(job, label, color) {
      const total = totalSeconds(job);
      return `
        <article class="compare-card" style="--accent:${color}">
          <p class="compare-label">${label}</p>
          <div class="compare-job-title">${job.id} <span class="status ${job.status.toLowerCase()}">${job.status}</span></div>
          <div class="compare-meta">${job.createdAt.replace(",", ",")} &nbsp;•&nbsp; ${formatInteger(job.requests)} Requests</div>
          <div class="compare-kpis">
            <div class="compare-kpi"><span>Total Time</span><strong>${formatDuration(total)}</strong><small>(${total.toFixed(2)}s)</small></div>
            <div class="compare-kpi"><span>Pricing Time</span><strong>${formatDuration(job.timing.pricing)}</strong><small>(${job.timing.pricing.toFixed(2)}s)</small></div>
            <div class="compare-kpi"><span>VM Lifecycle Time</span><strong>${formatDuration(vmLifecycleSeconds(job))}</strong><small>(${vmLifecycleSeconds(job).toFixed(2)}s)</small></div>
          </div>
        </article>
      `;
    }

    function diffKpi(label, aValue, bValue) {
      const diff = aValue - bValue;
      const percent = bValue ? diff / bValue * 100 : 0;
      return `
        <div class="compare-kpi">
          <span>${label}</span>
          <strong class="${deltaClass(diff)}">${formatSignedDuration(diff)}</strong>
          <small class="${deltaClass(diff)}">(${formatSignedPercent(percent)})</small>
        </div>
      `;
    }

    function renderCompareSummary() {
      const totalA = totalSeconds(compareJobA);
      const totalB = totalSeconds(compareJobB);
      document.getElementById("compareSummary").innerHTML = `
        ${compareCard(compareJobA, "Job A", "#2878f0")}
        ${compareCard(compareJobB, "Job B", "#16b8ad")}
        <article class="compare-card diff">
          <p class="compare-label" style="color:#111827">Difference (A - B) <span class="info"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg></span></p>
          <div style="height:44px"></div>
          <div class="compare-kpis">
            ${diffKpi("Total Time", totalA, totalB)}
            ${diffKpi("Pricing Time", compareJobA.timing.pricing, compareJobB.timing.pricing)}
            ${diffKpi("VM Lifecycle Time", vmLifecycleSeconds(compareJobA), vmLifecycleSeconds(compareJobB))}
          </div>
        </article>
      `;

    function renderCompareStageTable() {
      const totalA = totalSeconds(compareJobA);
      const totalB = totalSeconds(compareJobB);
      const maxStage = Math.max(...stages.flatMap(stage => [compareJobA.timing[stage.key], compareJobB.timing[stage.key]]));
      document.getElementById("jobAGroup").textContent = `Job A (${totalA.toFixed(2)}s)`;
      document.getElementById("jobBGroup").textContent = `Job B (${totalB.toFixed(2)}s)`;
      const rows = stages.map(stage => {
        const a = compareJobA.timing[stage.key];
        const b = compareJobB.timing[stage.key];
        const diff = a - b;
        const percent = b ? diff / b * 100 : 0;
        return `
          <tr>
            <td><span class="compare-stage-name"><span class="dot" style="--color:${stage.color}"></span>${stage.label}</span></td>
            <td>${a.toFixed(2)}</td>
            <td>${(a / totalA * 100).toFixed(1)}%</td>
            <td><span class="wide-track"><span class="wide-fill" style="--color:var(--blue); --w:${a / totalA * 100}%"></span></span></td>
            <td>${b.toFixed(2)}</td>
            <td>${(b / totalB * 100).toFixed(1)}%</td>
            <td><span class="wide-track"><span class="wide-fill" style="--color:var(--teal); --w:${b / totalB * 100}%"></span></span></td>
            <td class="${deltaClass(diff)}">${diff >= 0 ? "+" : ""}${diff.toFixed(2)}</td>
            <td class="${deltaClass(diff)}">${formatSignedPercent(percent)}</td>
            <td>
              <div class="comparison-bars">
                <span class="comparison-bar"><span class="wide-track"><span class="wide-fill" style="--color:var(--blue); --w:${a / maxStage * 100}%"></span></span>${a.toFixed(2)}s</span>
                <span class="comparison-bar"><span class="wide-track"><span class="wide-fill" style="--color:var(--teal); --w:${b / maxStage * 100}%"></span></span>${b.toFixed(2)}s</span>
              </div>
            </td>
          </tr>
        `;
      }).join("");
      const totalDiff = totalA - totalB;
      document.getElementById("compareStageBody").innerHTML = rows + `
        <tr style="font-weight:800">
          <td>Total</td>
          <td>${totalA.toFixed(2)}</td>
          <td>100%</td>
          <td></td>
          <td>${totalB.toFixed(2)}</td>
          <td>100%</td>
          <td></td>
          <td class="${deltaClass(totalDiff)}">${totalDiff >= 0 ? "+" : ""}${totalDiff.toFixed(2)}</td>
          <td class="${deltaClass(totalDiff)}">${formatSignedPercent(totalDiff / totalB * 100)}</td>
          <td></td>
        </tr>
      `;
    }

    function renderCompareRequests() {
      const totalA = totalSeconds(compareJobA);
      const totalB = totalSeconds(compareJobB);
      const pairs = compareJobA.topRequests.map(item => {
        const requestA = item.request;
        const requestB = compareJobB.requestRuns[item.index] || compareJobB.requestRuns[0];
        return { requestA, requestB, a: item.total, b: requestTotal(requestB) };
      });
      const max = Math.max(...pairs.flatMap(pair => [pair.a, pair.b]));
      document.getElementById("compareRequestBody").innerHTML = pairs.map(pair => {
        const diff = pair.a - pair.b;
        const percent = pair.b ? diff / pair.b * 100 : 0;
        return `
          <tr>
            <td>${pair.requestA.id}</td>
            <td>${formatDuration(pair.a, true)}</td>
            <td>${(pair.a / totalA * 100).toFixed(1)}%</td>
            <td>${formatDuration(pair.b, true)}</td>
            <td>${(pair.b / totalB * 100).toFixed(1)}%</td>
            <td class="${deltaClass(diff)}">${formatSignedDuration(diff)}</td>
            <td class="${deltaClass(diff)}">${formatSignedPercent(percent)}</td>
            <td>
              <div class="comparison-bars">
                <span class="comparison-bar"><span class="wide-track"><span class="wide-fill" style="--color:var(--blue); --w:${pair.a / max * 100}%"></span></span>${pair.a.toFixed(3)}s</span>
                <span class="comparison-bar"><span class="wide-track"><span class="wide-fill" style="--color:var(--teal); --w:${pair.b / max * 100}%"></span></span>${pair.b.toFixed(3)}s</span>
              </div>
            </td>
          </tr>
        `;
      }).join("");
    }

    function renderVisualCompare() {
      const totalA = totalSeconds(compareJobA);
      const totalB = totalSeconds(compareJobB);
      document.getElementById("visualCompare").innerHTML = [compareJobA, compareJobB].map((job, index) => {
        const total = index === 0 ? totalA : totalB;
        return `
          <div class="stack-row">
            <span>Job ${index === 0 ? "A" : "B"} (${total.toFixed(2)}s)</span>
            <div class="stacked-bar">
              ${stages.map(stage => {
                const pct = job.timing[stage.key] / total * 100;
                return `<span class="stack-piece" style="--color:${stage.color}; --w:${pct}%">${pct.toFixed(1)}%</span>`;
              }).join("")}
            </div>
          </div>
        `;
      }).join("");
      document.getElementById("visualLegend").innerHTML = stages.map(stage => `
        <span class="legend-item"><span class="dot" style="--color:${stage.color}"></span>${stage.short}</span>
      `).join("");
      const biggestDiff = stages.map(stage => ({
        stage,
        diff: compareJobA.timing[stage.key] - compareJobB.timing[stage.key]
      })).sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff))[0];
      const slower = biggestDiff.diff >= 0 ? "Job A" : "Job B";
      document.getElementById("compareInsight").innerHTML = `
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        ${slower} has higher total time mainly due to longer ${biggestDiff.stage.label} (${formatSignedDuration(biggestDiff.diff)}).
      `;
    }

    function renderPredefinedMetrics() {
      const activeCount = predefinedJobs.filter(job => job.state !== "Failed").length;
      const upcomingCount = predefinedJobs.filter(job => timeToMinutes(job.trigger) >= timeToMinutes("10:30")).length;
      const releaseCount = releaseWindows.filter(window => timeToMinutes(window.end) > timeToMinutes("10:30")).length;
      const averageMinutes = Math.round(predefinedJobs.reduce((sum, job) => sum + job.durationMinutes, 0) / predefinedJobs.length);
      const metricData = [
        { label: "Total Predefined Jobs", value: String(predefinedJobs.length), trend: `${activeCount} active`, icon: "briefcase", color: "#8d63e9", bg: "#f1ebff" },
        { label: "Jobs Triggered Today", value: "6", trend: "+ 20% vs yesterday", icon: "play", color: "#10a86b", bg: "#e8fbf4" },
        { label: "Average Duration", value: formatJobDuration(averageMinutes), trend: "- 8% vs yesterday", icon: "timer", color: "#2878f0", bg: "#eaf3ff" },
        { label: "Upcoming Triggers", value: String(upcomingCount), trend: "next 24h", icon: "calendar", color: "#ff842b", bg: "#fff0e7" },
        { label: "Release Windows", value: String(releaseCount), trend: "available next 24h", icon: "window", color: "#8d63e9", bg: "#f1ebff" }
      ];
      document.getElementById("predefinedMetrics").innerHTML = metricData.map(metric => `
        <article class="metric-card">
          <div>
            <div class="metric-icon" style="color:${metric.color}; background:${metric.bg}">${iconSvg(metric.icon)}</div>
            <div class="metric-label">${metric.label}</div>
            <div class="metric-value">${metric.value}</div>
          </div>
          <div class="trend"><span>${metric.trend}</span></div>
        </article>
      `).join("");
    }

    function timelineBlockStyle(start, end) {
      const left = timeToMinutes(start) / 1440 * 100;
      const width = (timeToMinutes(end) - timeToMinutes(start)) / 1440 * 100;
      return `left:${left}%; width:${Math.max(width, 2.4)}%`;
    }

    function jobTimelineRow(job) {
      const start = timeToMinutes(job.trigger);
      const end = Math.min(1440, start + job.durationMinutes);
      return `
        <div class="timeline-row">
          <button class="timeline-label job-link" type="button" data-predefined-job="${job.id}">
            ${job.name}
            <span>${job.schedule} - ${job.trigger}</span>
          </button>
          <div class="timeline-lane">
            <button class="timeline-card ${job.state.toLowerCase()}" type="button" data-predefined-job="${job.id}" style="${timelineBlockStyle(job.trigger, minutesToClock(end))}">
              ${job.state === "Upcoming" ? iconSvg("play") : iconSvg("check")}
              ${job.trigger} - ${minutesToClock(end)}
            </button>
          </div>
        </div>
      `;
    }

    function releaseTimelineRow(environment) {
      const windows = releaseWindows.filter(window => window.env === environment);
      return `
        <div class="timeline-row">
          <div class="timeline-label">Available Release Window (${environment})</div>
          <div class="timeline-lane">
            ${windows.map(window => `
              <span class="timeline-card release-window" style="${timelineBlockStyle(window.start, window.end)}">${window.start} - ${window.end}</span>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderPredefinedTimeline() {
      const ticks = Array.from({ length: 9 }, (_, index) => index * 180);
      const environments = ["QA", "UAT", "Pre-Prod", "Prod"];
      document.getElementById("predefinedTimeline").innerHTML = `
        <div class="time-scale">
          <div></div>
          <div class="time-axis">
            ${ticks.map(tick => `<span class="time-tick" style="left:${tick / 1440 * 100}%">${formatHour(tick)}</span>`).join("")}
          </div>
        </div>
        <div class="timeline-now" data-time="10:30" style="left: calc(220px + ${(timeToMinutes("10:30") / 1440) * 100}% - ${(timeToMinutes("10:30") / 1440) * 220}px)"></div>
        ${predefinedJobs.map(jobTimelineRow).join("")}
        ${environments.map(releaseTimelineRow).join("")}
      `;
      document.querySelectorAll("#predefinedTimeline [data-predefined-job]").forEach(element => {
        element.addEventListener("click", () => {
          selectedPredefinedJob = predefinedJobs.find(job => job.id === element.dataset.predefinedJob) || selectedPredefinedJob;
          renderPredefined();
        });
      });
    }

    function renderPredefinedDetail() {
      const job = selectedPredefinedJob;
      const releaseWindow = nextReleaseWindow(job);
      const trigger = timeToMinutes(job.trigger);
      const end = Math.min(1440, trigger + job.durationMinutes);
      document.getElementById("predefinedDetailName").textContent = job.name;
      const status = document.getElementById("predefinedDetailStatus");
      status.textContent = job.state === "Failed" ? "Needs Review" : "Active";
      status.className = `status ${statusClass(job.state)}`;
      document.getElementById("predefinedDetailBody").innerHTML = `
        <section class="detail-section">
          <h3>Trigger Time</h3>
          <div class="detail-grid">
            <div><span>Schedule</span><strong>${job.schedule}</strong></div>
            <div><span>Trigger Time</span><strong>${job.trigger} IST</strong></div>
            <div><span>Next Trigger</span><strong>${job.nextTrigger}</strong></div>
            <div><span>Timezone</span><strong>Asia/Kolkata</strong></div>
          </div>
        </section>
        <section class="detail-section">
          <h3>Duration</h3>
          <div class="detail-grid">
            <div><span>Expected</span><strong>${formatJobDuration(job.durationMinutes)}</strong></div>
            <div><span>Window</span><strong>${job.trigger} - ${minutesToClock(end)}</strong></div>
            <div><span>Average</span><strong>${job.averageDuration}</strong></div>
            <div><span>Last Run</span><strong>${job.lastRun}</strong></div>
          </div>
        </section>
        <section class="detail-section">
          <h3>Release Window (${job.environment})</h3>
          <div class="detail-grid">
            <div><span>Next Available</span><strong>${releaseWindow.start} - ${releaseWindow.end}</strong></div>
            <div><span>Windows Next 24h</span><strong>${releaseWindows.filter(window => window.env === job.environment).length}</strong></div>
          </div>
        </section>
        <section class="detail-section">
          <h3>Scope</h3>
          <div class="detail-grid">
            <div><span>Test Pack</span><strong>${job.scope}</strong></div>
            <div><span>Test Cases</span><strong>${formatInteger(job.testCases)}</strong></div>
            <div><span>Environment</span><strong>${job.environment}</strong></div>
            <div><span>Owner</span><strong>${job.owner}</strong></div>
          </div>
        </section>
        <div class="predefined-actions">
          <button class="action-button" type="button"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>Edit Job</button>
          <button class="compare-button" type="button"><svg viewBox="0 0 24 24"><path d="m8 5 11 7-11 7z"/></svg>Run Now</button>
        </div>
      `;
    }

    function renderPredefinedList() {
      const query = document.getElementById("predefinedSearch").value.trim().toLowerCase();
      const visibleJobs = predefinedJobs.filter(job => [
        job.name,
        job.environment,
        job.schedule,
        job.scope,
        job.state
      ].join(" ").toLowerCase().includes(query));
      document.getElementById("predefinedListBody").innerHTML = visibleJobs.map(job => {
        const releaseWindow = nextReleaseWindow(job);
        return `
          <tr class="${job.id === selectedPredefinedJob.id ? "selected" : ""}" data-predefined-job="${job.id}">
            <td><button class="job-link" type="button" data-predefined-job="${job.id}">${job.name}</button></td>
            <td>${job.environment}</td>
            <td>${job.schedule} at ${job.trigger}</td>
            <td>${formatJobDuration(job.durationMinutes)}</td>
            <td>${releaseWindow.start} - ${releaseWindow.end}</td>
            <td><span class="status ${statusClass(job.state)}">${job.state}</span></td>
            <td>${job.scope}</td>
          </tr>
        `;
      }).join("");
      document.querySelectorAll("#predefinedListBody [data-predefined-job]").forEach(element => {
        element.addEventListener("click", () => {
          selectedPredefinedJob = predefinedJobs.find(job => job.id === element.dataset.predefinedJob) || selectedPredefinedJob;
          renderPredefined();
        });
      });
    }

    function renderPredefined() {
      renderPredefinedMetrics();
      renderPredefinedTimeline();
      renderPredefinedDetail();
      renderPredefinedList();
    }

    function wireGlobalEvents() {
      document.querySelectorAll("[data-view]").forEach(item => {
        item.addEventListener("click", () => switchView(item.dataset.view));
      });
      document.getElementById("toggleFailures").addEventListener("click", () => {
        showFailuresOnly = !showFailuresOnly;
        document.getElementById("toggleFailures").style.borderColor = showFailuresOnly ? "#2878f0" : "";
        document.getElementById("toggleFailures").style.color = showFailuresOnly ? "#2878f0" : "";
        renderAll();
      });
      document.getElementById("refreshData").addEventListener("click", () => {
        const first = jobs.shift();
        jobs.push(first);
        selectedJob = jobs[0];
        requestGridJob = selectedJob;
        requestGridCompareJob = jobs.find(job => job.id !== requestGridJob.id) || null;
        selectedRequestIndex = 0;
        renderAll();
      });
    }

    function wireRequestGridEvents() {
      document.getElementById("requestJobSelect").addEventListener("change", event => {
        requestGridJob = jobs.find(job => job.id === event.target.value) || requestGridJob;
        if (requestGridCompareJob?.id === requestGridJob.id) {
          requestGridCompareJob = jobs.find(job => job.id !== requestGridJob.id) || null;
        }
        selectedJob = requestGridJob;
        selectedRequestIndex = 0;
        requestGridPage = 1;
        renderAll();
      });
      document.getElementById("requestCompareJobSelect").addEventListener("change", event => {
        requestGridCompareJob = jobs.find(job => job.id === event.target.value) || null;
        if (requestGridCompareJob?.id === requestGridJob.id) {
          requestGridCompareJob = jobs.find(job => job.id !== requestGridJob.id) || null;
        }
        requestGridPage = 1;
        renderRequestGrid();
      });
      document.getElementById("requestGridSearch").addEventListener("input", () => {
        requestGridPage = 1;
        renderRequestGrid();
      });
      document.getElementById("requestPrevPage").addEventListener("click", () => {
        requestGridPage = Math.max(1, requestGridPage - 1);
        renderRequestGrid();
      });
      document.getElementById("requestNextPage").addEventListener("click", () => {
        requestGridPage += 1;
        renderRequestGrid();
      });
    }

    function wireCompareEvents() {
      document.getElementById("compareA").addEventListener("change", event => {
        compareJobA = jobs.find(job => job.id === event.target.value) || compareJobA;
        if (compareJobA.id === compareJobB.id) {
          compareJobB = jobs.find(job => job.id !== compareJobA.id) || compareJobB;
        }
        renderCompare();
      });
      document.getElementById("compareB").addEventListener("change", event => {
        compareJobB = jobs.find(job => job.id === event.target.value) || compareJobB;
        if (compareJobA.id === compareJobB.id) {
          compareJobA = jobs.find(job => job.id !== compareJobB.id) || compareJobA;
        }
        renderCompare();
      });
      document.getElementById("swapCompare").addEventListener("click", () => {
        [compareJobA, compareJobB] = [compareJobB, compareJobA];
        renderCompare();
      });
      document.getElementById("runCompare").addEventListener("click", renderCompare);
    }

    function wireOverviewEvents() {
      document.getElementById("jobSearch").addEventListener("input", renderJobs);
      document.getElementById("requestSelect").addEventListener("change", event => {
        selectedRequestIndex = Number(event.target.value);
        renderSelectedRequest();
        renderTabs();
      });
      document.getElementById("prevRequest").addEventListener("click", () => {
        selectedRequestIndex = Math.max(0, selectedRequestIndex - 1);
        renderDetails();
      });
      document.getElementById("nextRequest").addEventListener("click", () => {
        selectedRequestIndex = Math.min(selectedJob.requestRuns.length - 1, selectedRequestIndex + 1);
        renderDetails();
      });
      document.getElementById("overviewTab").addEventListener("click", () => {
        activeTab = "overview";
        renderTabs();
      });
      document.getElementById("requestsTab").addEventListener("click", () => {
        activeTab = "requests";
        renderTabs();
      });
      document.getElementById("copyJob").addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(selectedJob.id);
        } catch (error) {
          console.info("Clipboard unavailable", error);
        }
      });
    }

    function wireJobsEvents() {
      wireOverviewEvents();
    }

    function wirePredefinedEvents() {
      document.getElementById("predefinedSearch").addEventListener("input", renderPredefinedList);
    }

    function wireStaticPageEvents() {}

    function renderAll() {
      microPages[currentView].render();
    }

    wireGlobalEvents();
    switchView("overview");
  </script>
</body>
</html>
