<section class="requests-page" id="requestsPage">
        <section class="page-head" style="margin-bottom: 2px">
          <div>
            <h1>Price Requests</h1>
            <p class="subtitle">Inspect every price request and step-level execution metric for a selected job.</p>
          </div>
          <div class="health-chip"><span class="dot" style="--color: var(--blue)"></span> <span id="requestGridCount">10,000 requests</span></div>
        </section>

        <section class="request-grid-toolbar">
          <label class="toolbar-field">
            <span>Job A</span>
            <select id="requestJobSelect" aria-label="Job for request grid"></select>
          </label>
          <label class="toolbar-field">
            <span>Job B</span>
            <select id="requestCompareJobSelect" aria-label="Second job for request grid"></select>
          </label>
          <label class="toolbar-field">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input id="requestGridSearch" type="search" placeholder="Search request id, trade id, host">
          </label>
          <div class="request-grid-meta">
            <span id="requestGridRange">1-100 of 10,000</span>
            <button class="page-size" id="requestPrevPage" type="button" aria-label="Previous request page"><svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></button>
            <button class="page-size" id="requestNextPage" type="button" aria-label="Next request page"><svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></button>
          </div>
        </section>

        <section class="panel table-panel">
          <div class="table-head">
            <h2 class="panel-title">Request Grid</h2>
            <div class="request-grid-meta">
              <span class="legend-item"><span class="dot" style="--color: var(--blue)"></span>Data Prepare</span>
              <span class="legend-item"><span class="dot" style="--color: var(--teal)"></span>Calculate</span>
              <span class="legend-item"><span class="dot" style="--color: var(--orange)"></span>Clean Up</span>
            </div>
          </div>
          <div class="table-scroll">
            <table class="jobs-table request-data-table">
              <thead id="requestGridHead"></thead>
              <tbody id="requestGridBody"></tbody>
            </table>
            <div class="empty" id="requestGridEmpty">No requests match the current search.</div>
          </div>
        </section>
      </section>
